<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Impostor Vibe Cards 🎴</title> 
  <style>
    :root{
      --bg0:#070912; --bg1:#0b0f24; --panel: rgba(255,255,255,.06); 
      --border: rgba(255,255,255,.10); --text:#eef1ff;
      --muted: rgba(238,241,255,.68); --muted2: rgba(238,241,255,.52);
      --shadow: 0 18px 60px rgba(0,0,0,.55); --radius: 18px;
      --accent1:#7c5cff; --accent2:#33ffd6; --danger:#ff416d;
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; }
    body{
      margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 700px at 20% 10%, rgba(124,92,255,.26), transparent 60%),
        radial-gradient(900px 650px at 85% 30%, rgba(51,255,214,.16), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      display:flex; justify-content:center;
      padding: clamp(14px, 2.8vw, 24px);
      padding-top: max(14px, env(safe-area-inset-top));
      padding-bottom: max(14px, env(safe-area-inset-bottom));
    }
    .wrap{ width:min(980px, 100%); display:grid; gap:14px; }
    header{
      border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 18px 16px 14px; backdrop-filter: blur(10px);
    }
    h1{ margin:0 0 6px; font-size: clamp(20px, 3.3vw, 32px); }
    .sub{ margin:0; color:var(--muted); font-size: 13.5px; }
    .grid{ display:grid; gap:14px; grid-template-columns: 1fr 1.15fr; }
    @media (max-width: 900px){ .grid{ grid-template-columns:1fr; } }
    .panel{
      border:1px solid var(--border); background: rgba(255,255,255,.06);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 16px; backdrop-filter: blur(10px);
    }
    .row{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:12px; }
    @media (max-width: 520px){ .row{ grid-template-columns:1fr; } }
    label{ display:block; color:var(--muted); font-size: 12.5px; margin-bottom:6px; }
    input{
      width:100%; padding: 12px; border-radius: 14px;
      border:1px solid var(--border); background: rgba(0,0,0,.28);
      color:var(--text); outline:none; font-size: 15px;
    }
    .btns{ display:flex; flex-wrap:wrap; gap:10px; margin-top: 12px; }
    button{
      border:0; border-radius: 14px; padding: 12px 14px; cursor:pointer;
      user-select:none; font-weight:700; font-size: 13.5px;
    }
    .primary{ background: linear-gradient(135deg, var(--accent1), var(--accent2)); color:#070912; }
    .ghost{ background: rgba(255,255,255,.08); border:1px solid var(--border); color:var(--text); }
    .danger{ background: rgba(255,65,109,.16); border:1px solid rgba(255,65,109,.32); color:#ffd3dc; }
    .gameTop{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom: 10px; }
    .pill{ font-size: 12px; color: var(--muted); padding: 8px 10px; border-radius: 999px; border:1px solid var(--border); background: rgba(0,0,0,.22); }
    .pill strong{ color:var(--text); }
    .progress{ width:100%; height: 10px; border-radius: 999px; overflow:hidden; border:1px solid var(--border); background: rgba(0,0,0,.22); }
    .bar{ height:100%; width:0%; background: linear-gradient(90deg, var(--accent1), var(--accent2)); }
    .card{
      margin-top: 14px; border-radius: 22px; border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.18));
      min-height: 210px; display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding: 22px 16px; text-align:center; cursor:pointer; user-select:none;
    }
    .word{ margin:0; font-weight: 900; font-size: clamp(22px, 6vw, 38px); }
    .imposter{ color:#ffd4dc; }
    .hint{ margin-top: 10px; color: var(--muted2); font-size: 12.5px; }
    @media (max-width: 520px){ button{ width:100%; } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Impostor Vibe Cards 🎴</h1>
      <p class="sub">Nur Genres & Vibes – ein Wort lesen = direkt ein Song im Kopf.</p>
    </header>

    <div class="grid">
      <section class="panel">
        <div class="row">
          <div>
            <label>Spieleranzahl</label>
            <input id="playerCount" type="number" min="1" value="5">
          </div>
          <div>
            <label>Imposter</label>
            <input id="imposterCount" type="number" min="0" value="1">
          </div>
        </div>
        <div class="btns">
          <button class="primary" id="startBtn">Spiel starten</button>
          <button class="ghost" id="reshuffleBtn">Neu mischen</button>
          <button class="danger" id="resetBtn">Reset</button>
        </div>
        <p class="hint" id="setupHint"></p>
      </section>

      <section class="panel">
        <div class="gameTop">
          <div>
            <span class="pill">Spieler: <strong id="pCount">–</strong></span>
            <span class="pill">Imposter: <strong id="iCount">–</strong></span>
            <span class="pill">Aktuell: <strong id="currentPlayer">–</strong></span>
          </div>
          <button class="ghost" id="nextBtn" disabled>Nächster Spieler</button>
        </div>
        <div class="progress"><div class="bar" id="progressBar"></div></div>

        <div class="card" id="card">
          <small id="cardTop">Noch kein Spiel gestartet</small>
          <p class="word" id="cardWord">Spiel starten</p>
          <div class="hint" id="cardHint">Tippe auf die Karte</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    // 50 passende Genre- & Vibe-Wörter
    const WORDS = [
      "House","Techno","Afrobeats","Amapiano","Drill","Trap","R&B","Pop","Indie","Lo-Fi",
      "Sommer","Sonnenuntergang","Spätsommer","Sommernacht","Late Night Drive","Night Drive",
      "TikTok","2016 Vibes","2018 Vibes","Throwback","Nostalgie","Heartbreak","Traurig","Happy","Chill",
      "Club","Afterparty","Festival","Roadtrip","Beach Vibes","Poolparty","Golden Hour","Neon Nights",
      "City Lights","Sad Boy","Sad Girl","Glow Up","Main Character","Gym Mode","Hype","Spicy",
      "Romantic","Dark Mood","Melancholisch","Motiviert","Euphorisch","Dreamy","Rainy Night","Midnight"
    ];

    const pcEl = document.getElementById("playerCount");
    const icEl = document.getElementById("imposterCount");
    const setupHint = document.getElementById("setupHint");
    const pCount = document.getElementById("pCount");
    const iCount = document.getElementById("iCount");
    const curP = document.getElementById("currentPlayer");
    const bar = document.getElementById("progressBar");
    const card = document.getElementById("card");
    const cardTop = document.getElementById("cardTop");
    const cardWord = document.getElementById("cardWord");
    const cardHint = document.getElementById("cardHint");
    const startBtn = document.getElementById("startBtn");
    const reshuffleBtn = document.getElementById("reshuffleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const nextBtn = document.getElementById("nextBtn");

    let players = [], idx = 0, revealed = false;

    function validate(){
      let pc = Math.max(1, parseInt(pcEl.value||1));
      let ic = Math.max(0, parseInt(icEl.value||0));
      if(ic > pc) ic = pc;
      pcEl.value = pc; icEl.value = ic;
      setupHint.textContent = "Regel: Imposter ≤ Spieler.";
      return {pc, ic};
    }

    function pickWord(){
      return WORDS[Math.floor(Math.random()*WORDS.length)];
    }

    function deal(pc, ic){
      const w = pickWord();
      players = Array(pc).fill(w);
      let set = 0;
      while(set < ic){
        const i = Math.floor(Math.random()*pc);
        if(players[i] !== "IMPOSTER"){ players[i] = "IMPOSTER"; set++; }
      }
    }

    function header(){
      pCount.textContent = players.length || "–";
      iCount.textContent = players.filter(x=>x==="IMPOSTER").length || "–";
      curP.textContent = players.length ? (idx+1) : "–";
      bar.style.width = players.length ? ((idx/players.length)*100)+"%" : "0%";
    }

    function faceDown(){
      cardTop.textContent = `Spieler ${idx+1} ist dran`;
      cardWord.textContent = "Karte umdrehen";
      cardWord.classList.remove("imposter");
      cardHint.textContent = "Tippe auf die Karte";
      revealed = false;
      nextBtn.disabled = true;
      header();
    }

    function start(){
      const {pc, ic} = validate();
      deal(pc, ic); idx = 0; faceDown();
    }

    function reshuffle(){
      if(!players.length) return start();
      const pc = players.length;
      const ic = players.filter(x=>x==="IMPOSTER").length;
      deal(pc, ic); idx = 0; faceDown();
    }

    function resetAll(){
      players = []; idx = 0; revealed = false;
      cardTop.textContent = "Noch kein Spiel gestartet";
      cardWord.textContent = "Spiel starten";
      cardWord.classList.remove("imposter");
      cardHint.textContent = "—";
      nextBtn.disabled = true;
      bar.style.width = "0%";
      header();
    }

    function reveal(){
      if(!players.length || revealed) return;
      const v = players[idx];
      if(v === "IMPOSTER"){
        cardWord.textContent = "IMPOSTER";
        cardWord.classList.add("imposter");
        cardHint.textContent = "Pokerface 😈";
      } else {
        cardWord.textContent = v;
        cardWord.classList.remove("imposter");
        cardHint.textContent = "Merken → weitergeben";
      }
      revealed = true; nextBtn.disabled = false;
    }

    function next(){
      if(!revealed) return alert("Erst Karte umdrehen!");
      idx++;
      if(idx >= players.length){
        bar.style.width = "100%";
        curP.textContent = "–";
        cardTop.textContent = "Runde beendet";
        cardWord.textContent = "Diskutieren & Imposter finden";
        cardHint.textContent = "Neu mischen für nächste Runde";
        nextBtn.disabled = true;
        return;
      }
      faceDown();
    }

    startBtn.onclick = start;
    reshuffleBtn.onclick = reshuffle;
    resetBtn.onclick = resetAll;
    nextBtn.onclick = next;
    card.onclick = reveal;
    pcEl.oninput = validate;
    icEl.oninput = validate;
    header();
  </script>
</body>
</html>
